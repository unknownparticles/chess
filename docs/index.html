<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 棋类游戏 - 五子棋 & 井字棋</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="title">
                <span class="title-icon">🎮</span>
                AI 棋类游戏
            </h1>
            <p class="subtitle">挑战强大的 AI 对手</p>
        </header>

        <!-- Game Selection -->
        <div class="game-selector">
            <button class="game-btn active" data-game="gomoku">
                <span class="game-icon">⚫</span>
                <span class="game-name">五子棋</span>
                <span class="game-desc">15×15 棋盘</span>
            </button>
            <button class="game-btn" data-game="tictactoe">
                <span class="game-icon">❌</span>
                <span class="game-name">井字棋</span>
                <span class="game-desc">3×3 棋盘</span>
            </button>
        </div>

        <!-- Game Board Container -->
        <div class="game-container">
            <!-- Game Info -->
            <div class="game-info">
                <div class="info-card">
                    <span class="info-label">当前玩家</span>
                    <span class="info-value" id="current-player">⚫ 黑方</span>
                </div>
                <div class="info-card">
                    <span class="info-label">游戏状态</span>
                    <span class="info-value" id="game-status">进行中</span>
                </div>
                <div class="info-card">
                    <span class="info-label">AI 难度</span>
                    <div class="difficulty-control">
                        <input id="ai-difficulty" class="difficulty-range" type="range" min="1" max="100" value="55">
                        <span class="difficulty-value" id="ai-difficulty-value">55 级</span>
                    </div>
                </div>
                <div class="info-card">
                    <span class="info-label">上一步棋</span>
                    <span class="info-value" id="last-move">暂无</span>
                </div>
                <div class="info-card">
                    <span class="info-label">本局评级</span>
                    <span class="info-value" id="move-rating">结束后生成</span>
                </div>
            </div>

            <!-- Canvas Board -->
            <div class="board-wrapper">
                <canvas id="game-board"></canvas>
                <div class="loading-overlay" id="loading">
                    <div class="spinner"></div>
                    <p>AI 思考中...</p>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button class="control-btn primary" id="reset-btn">
                    <span>🔄</span> 重新开始
                </button>
                <button class="control-btn secondary" id="first-player-btn">
                    <span>🎲</span> 切换先手
                </button>
                <button class="control-btn secondary" id="theme-btn">
                    <span>🌓</span> 切换主题
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>使用 WebAssembly 技术 | C++ 游戏引擎 | Minimax AI 算法</p>
        </footer>
    </div>

    <div class="settlement-overlay" id="settlement-overlay" aria-hidden="true">
        <div class="settlement-panel" role="dialog" aria-modal="true" aria-labelledby="settlement-title">
            <button class="settlement-close" id="settlement-close" type="button" aria-label="关闭结算">×</button>
            <p class="settlement-kicker" id="settlement-result">本局结束</p>
            <h2 class="settlement-title" id="settlement-title">结算</h2>
            <div class="settlement-score">
                <span class="settlement-score-label">本轮得分</span>
                <strong id="settlement-score">0</strong>
                <span>分</span>
            </div>
            <div class="settlement-grid">
                <div>
                    <span>相当于</span>
                    <strong id="settlement-level">0 级 AI</strong>
                </div>
                <div>
                    <span>对手等级</span>
                    <strong id="settlement-ai-level">0 级</strong>
                </div>
                <div>
                    <span>下一局</span>
                    <strong id="settlement-next-level">0 级</strong>
                </div>
            </div>
            <button class="control-btn primary settlement-action" id="settlement-next-btn" type="button">
                <span>↻</span> 再来一局
            </button>
        </div>
    </div>

    <script src="game_module.js"></script>
    <script src="game.js"></script>
</body>

</html>
